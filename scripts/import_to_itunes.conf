# Config for import_to_itunes.sh — edit these, then just run the script.

# Folder containing the downloaded songs to add to iTunes (searched recursively for *.mp3).
SONGS_DIR="C:/Users/you/Music/Tunes"

# Python interpreter to run sync_to_itunes.py with. Must be a native Windows Python
# install with pywin32 (`pip install pywin32`) — not WSL/Linux Python, which cannot
# reach iTunes' COM interface.
PYTHON="python"
